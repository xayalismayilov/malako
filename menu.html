<style>
:root{
  --cream:#FAF6F0;
  --milk:#F5EDE0;
  --latte:#E8D5B7;
  --caramel:#C4965A;
  --mocha:#8B6343;
  --espresso:#4A3020;
  --dark:#2C1A0E;
  --white:#FFFFFF;
  --text-muted:#9B7B5A;
  --border:rgba(139,99,67,0.2);
  --shadow:rgba(74,48,32,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Jost',sans-serif;
  color:var(--dark);
  background-color:#F5F0E8;
  background-image:url('https://www.transparenttextures.com/patterns/aged-paper.png');

  background-attachment:fixed;
}
body.bg-image-set{background:var(--bg-image) center/cover fixed no-repeat}
body.bg-image-set::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(250,246,240,0.85);z-index:-1;pointer-events:none}

nav{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  padding:0 5%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:70px;
  background:rgba(250,246,240,0.95);

.nav-logo{

  font-size:1.8rem;
  color:var(--espresso);
  text-decoration:none
}
.nav-left{
  display:flex;
  align-items:center;
  gap:1rem
}
.nav-right{
  display:flex;
  align-items:center;
  gap:0.8rem
}
.nav-back{
  color:var(--mocha);
  text-decoration:none;
  font-size:0.85rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:0.4rem;
  border:1px solid var(--border);
  padding:0.5rem 1.1rem;
  border-radius:50px;
  transition:all 0.3s
}
.nav-back:hover{
  border-color:var(--caramel);
  color:var(--caramel)
}
.lang-switcher{
  position:relative;
  display:inline-flex;
  align-items:center
}
.lang-btn{
  background:transparent;
  border:1px solid var(--border);
  border-radius:50px;
  padding:0.45rem 0.9rem;
  font-size:0.78rem;
  font-weight:500;
  letter-spacing:0.05em;
  text-transform:uppercase;
  cursor:pointer;
  font-family:'Jost',sans-serif;
  color:var(--mocha);
  transition:all 0.3s;
  display:flex;
  align-items:center;
  gap:0.4rem
}
.lang-btn:hover{
  border-color:var(--caramel);
  color:var(--caramel)
}
.lang-dropdown{
  position:absolute;
  top:100%;
  right:0;
  margin-top:0.5rem;
  background:var(--white);
  border-radius:16px;
  border:1px solid var(--latte);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  min-width:150px;
  z-index:1000;
  display:none;
  overflow:hidden
}
.lang-dropdown.show{
  display:block
}
.lang-option{
  display:flex;
  align-items:center;
  gap:0.5rem;
  padding:0.7rem 1rem;
  cursor:pointer;
  font-size:0.85rem;
  color:var(--mocha);
  transition:background 0.2s
}
.lang-option:hover{
  background:var(--milk)
}
.lang-option.active{
  background:var(--milk);
  color:var(--caramel);
  font-weight:500
}
.hamburger{
  display:none;
  flex-direction:column;
  gap:5px;
  cursor:pointer;
  background:none;
  border:none;
  padding:5px
}
.hamburger span{
  width:24px;
  height:2px;
  background:var(--espresso);
  display:block
}
.mobile-nav{
  position:fixed;
  inset:0;
  background:var(--cream);
  z-index:999;
  transform:translateX(100%);
  transition:transform 0.4s;
  display:flex;
  flex-direction:column;

.mobile-nav.open{

.mobile-lang-section{

.mobile-lang-item{

  color:var(--mocha);
  background:var(--milk)
}
.mobile-lang-item.active{

.dish-body{

}
.dish-name{
  font-family:'Playfair Display',serif;
  font-size:1.1rem;
  color:var(--espresso);

.dish-desc{

.dish-footer{

}
.dish-price{

  font-size:1.1rem;

.dish-tag{

  left:50%;

  border:1px solid var(--latte);

.promo-popup.show{

  transform:translateX(-50%) translateY(0)

.promo-icon{

.promo-icon img{

.promo-content{

}
.promo-content h4{
  font-family:'Playfair Display',serif;
  color:var(--espresso);
  font-size:1rem;
  margin-bottom:0.3rem;

}
.promo-content p{
  font-size:0.8rem;
  color:var(--text-muted);
  line-height:1.4;
  margin-bottom:0.5rem
}
.promo-content a:hover{

}
.promo-close{
  background:none;
  border:none;
  font-size:1.3rem;
  cursor:pointer;
  color:var(--text-muted);
  padding:4px 8px;
  flex-shrink:0;
  transition:color 0.2s;

.promo-close:hover{

@media (max-width:500px){
  .promo-popup{
    flex-direction:column;
    text-align:center;
    padding:1rem

  .promo-icon{
    width:100px;
    height:100px;
    margin-bottom:0.5rem
  }
}

footer{
  background:var(--dark);
  color:var(--latte);
  padding:3rem 5%;
  text-align:center
}
footer a{
  color:var(--caramel);
  text-decoration:none;

}
footer p{
  margin-top:1rem;

  color:rgba(232,213,183,0.5)
}

@media(max-width:768px){
  .menu-grid{
    grid-template-columns:1fr
  }
}
@media(max-width:480px){
  .menu-grid{
    grid-template-columns:1fr
  }
}
</style>
</head>

<script>
// ========== SUPABASE КОНФИГУРАЦИЯ ==========
const SUPABASE_URL = 'https://wlnifdqfnxhqlyvlmadi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsbmlmZHFmbnhocWx5dmxtYWRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NzU0NjcsImV4cCI6MjA5ODA1MTQ2N30.fu-1pKRjjFCKUb8mtEMmsO2DL9hyeLUo1oHIwFHsdwg';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
let allCategories = [];
let allMenuItems = [];
let popupTimeout = null;
let popupShown = false;
let currentLang = 'az';
let siteSettings = {};

// ========== ИНИЦИАЛИЗАЦИЯ I18NEXT ==========
async function initI18n() {
  try {
    await i18next
      .use(window.i18nextHttpBackend)
      .use(window.i18nextBrowserLanguageDetector)
      .init({
        fallbackLng: 'az',
        supportedLngs: ['az', 'ru', 'en'],
        ns: ['common'],
        defaultNS: 'common',
        backend: {
          loadPath: './locales/{{lng}}/{{ns}}.json'
        },
        detection: {
          order: ['localStorage', 'navigator'],
          lookupLocalStorage: 'selected_language',
          caches: ['localStorage']
        },
        interpolation: {
          escapeValue: false
        }
      });
    
    const savedLang = localStorage.getItem('selected_language');
    if (savedLang && ['az', 'ru', 'en'].includes(savedLang)) {
      currentLang = savedLang;
      await i18next.changeLanguage(savedLang);
    } else {
      currentLang = 'az';
      localStorage.setItem('selected_language', 'az');
      await i18next.changeLanguage('az');
    }
    
    updateUILanguage();
    return true;
  } catch (e) {
    console.error('Ошибка инициализации i18next:', e);
    return false;
  }
}

// ========== ОБНОВЛЕНИЕ UI ПО ЯЗЫКУ ==========
function updateUILanguage() {
  document.documentElement.lang = currentLang === 'az' ? 'az' : (currentLang === 'ru' ? 'ru' : 'en');
  
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const translation = i18next.t(key);
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
      if (el.placeholder !== undefined) el.placeholder = translation;
    } else {
      el.innerHTML = translation;
    }
  });
  
  const flags = { az: '🇦🇿', ru: '🇷🇺', en: '🇬🇧' };
  const texts = { az: 'AZ', ru: 'RU', en: 'EN' };
  const cf = document.getElementById('currentLangFlag');
  const ct = document.getElementById('currentLangText');
  if (cf) cf.textContent = flags[currentLang];
  if (ct) ct.textContent = texts[currentLang];
  
  document.querySelectorAll('.lang-option, .mobile-lang-item').forEach(opt => {
    const lang = opt.getAttribute('data-lang');
    if (lang === currentLang) {
      opt.classList.add('active');
    } else {
      opt.classList.remove('active');
    }
  });
  
  localStorage.setItem('selected_language', currentLang);
}

// ========== ПЕРЕКЛЮЧЕНИЕ ЯЗЫКА ==========
function setLanguage(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  localStorage.setItem('selected_language', lang);
  i18next.changeLanguage(lang).then(() => {
    updateUILanguage();
    // Перерисовываем меню с новым языком
    buildMenu();
    const dd = document.getElementById('langDropdown');
    if (dd) dd.classList.remove('show');
  });
}

// ========== ЯЗЫКОВОЙ ПЕРЕКЛЮЧАТЕЛЬ ==========
function initLangSwitcher() {
  const btn = document.getElementById('langBtn');
  const dd = document.getElementById('langDropdown');
  
  if (btn && dd) {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      dd.classList.toggle('show');
    });
    document.addEventListener('click', () => dd.classList.remove('show'));
  }
  
  document.querySelectorAll('.lang-option').forEach(opt => {
    opt.addEventListener('click', () => {
      const lang = opt.getAttribute('data-lang');
      if (lang) setLanguage(lang);
    });
  });
  
  document.querySelectorAll('.mobile-lang-item').forEach(opt => {
    opt.addEventListener('click', () => {
      const lang = opt.getAttribute('data-lang');
      if (lang) setLanguage(lang);
      document.getElementById('mobileNav')?.classList.remove('open');
    });
  });
}

// ========== ПОЛУЧЕНИЕ ПЕРЕВОДА БЛЮДА ==========
function getDishTranslation(translations, lang) {
  if (!translations || translations.length === 0) return null;
  const found = translations.find(t => t.language === lang);
  if (found) return found;
  return translations.find(t => t.language === 'az') || translations[0] || null;
}

function getDishName(translations, lang) {
  const t = getDishTranslation(translations, lang);
  return t ? t.name : null;
}

function getDishDescription(translations, lang) {
  const t = getDishTranslation(translations, lang);
  return t ? t.description : null;
}

// ========== ПОЛУЧЕНИЕ ПЕРЕВОДА КАТЕГОРИИ ==========
function getCategoryTranslation(translations, lang) {
  if (!translations || translations.length === 0) return null;
  const found = translations.find(t => t.language === lang);
  if (found) return found;
  return translations.find(t => t.language === 'az') || translations[0] || null;
}

function getCategoryName(translations, lang) {
  const t = getCategoryTranslation(translations, lang);
  return t ? t.name : null;
}

// ========== ЗАГРУЗКА НАСТРОЕК ==========
async function loadAllSettings() {
  try {
    const { data } = await supabaseClient.from('settings').select('*');
    (data || []).forEach(s => siteSettings[s.key] = s.value);
    
    applyAppearanceSettings();
    applyLogoSettings();
    await loadMenuData();
    await loadPromoPopup();
    applyMenuTexts();
  } catch(e) { console.error('Ошибка загрузки настроек:', e); }
}

// ========== ВНЕШНИЙ ВИД ==========
function applyAppearanceSettings() {
  const bgType = siteSettings.site_bg_type || 'preset';
  const presets = {
    stone: { bg: '#F5F0E8', pattern: "url('https://www.transparenttextures.com/patterns/aged-paper.png')" },
    paper: { bg: '#F5F0E8', pattern: "url('https://www.transparenttextures.com/patterns/aged-paper.png')" },
    concrete: { bg: '#E8E4D9', pattern: "url('https://www.transparenttextures.com/patterns/concrete-wall.png')" },
    map: { bg: '#EAE5D9', pattern: "url('https://www.transparenttextures.com/patterns/cartographer.png')" }
  };
  if (bgType === 'preset') {
    const p = presets[siteSettings.site_bg_preset || 'stone'] || presets.stone;
    document.body.style.background = `${p.pattern} ${p.bg}`;
    document.body.style.backgroundRepeat = 'repeat';
    document.body.classList.remove('bg-image-set');
  } else if (bgType === 'image' && siteSettings.site_bg_image) {
    document.body.classList.add('bg-image-set');
    document.body.style.setProperty('--bg-image', `url('${siteSettings.site_bg_image}')`);
    document.body.style.background = `var(--bg-image) center/cover no-repeat fixed`;
  } else if (bgType === 'color') {
    document.body.classList.remove('bg-image-set');
    document.body.style.background = siteSettings.site_bg_color || '#F5F0E8';
  }
}

// ========== ЛОГОТИП ==========
function applyLogoSettings() {
  const logoLink = document.querySelector('.nav-logo');
  if (!logoLink) return;
  if ((siteSettings.logo_type || 'text') === 'text') {
    logoLink.innerHTML = siteSettings.logo_text || 'Malako';
    logoLink.style.fontSize = (siteSettings.logo_text_size || '28') + 'px';
    logoLink.style.color = siteSettings.logo_text_color || '#4A3020';
    logoLink.style.fontFamily = "'Playfair Display', serif";
    logoLink.style.fontWeight = '600';
  } else if (siteSettings.logo_image) {
    logoLink.innerHTML = `<img src="${siteSettings.logo_image}" alt="Malako" style="height:${siteSettings.logo_height || 'auto'}; width:${siteSettings.logo_width || '180'}px; max-height:50px; object-fit:contain">`;
  }
}

// ========== ТЕКСТЫ МЕНЮ ==========
function applyMenuTexts() {
  const heroLabel = document.getElementById('menuHeroLabel');
  const heroEm = document.getElementById('menuHeroEm');
  if (heroLabel) heroLabel.textContent = i18next.t('menu_page_label');
  if (heroEm) heroEm.textContent = i18next.t('menu_page_em');
}

// ========== ЗАГРУЗКА ДАННЫХ МЕНЮ ==========
async function loadMenuData() {
  try {
    const { data: categories } = await supabaseClient
      .from('categories')
      .select('*, category_translations(*)')
      .order('sort_order', { ascending: true });
    
    const { data: menuItems } = await supabaseClient
      .from('menu_items')
      .select('*, dish_translations(*)')
      .order('sort_order', { ascending: true });
    
    allCategories = categories || [];
    allMenuItems = menuItems || [];
    buildMenu();
  } catch(e) {
    console.error('Ошибка загрузки меню:', e);
    showErrorMessage('Menyu yüklənərkən xəta baş verdi');
  }
}

function showErrorMessage(message) {
  const bodyContainer = document.getElementById('menuBody');
  if (bodyContainer) {
    bodyContainer.innerHTML = `
      <div style="text-align:center;padding:3rem;color:var(--caramel)">
        <p style="font-size:1.2rem;margin-bottom:1rem">⚠️</p>
        <p>${message}</p>
        <button onclick="location.reload()" style="margin-top:1rem;padding:0.5rem 1.5rem;background:var(--espresso);color:white;border:none;border-radius:50px;cursor:pointer">Səhifəni yenilə</button>
      </div>
    `;
  }
}

function buildMenu() {
  const nav = document.getElementById('stickyNav');
  const body = document.getElementById('menuBody');
  if (!nav || !body) return;
  
  if (allCategories.length === 0) {
    body.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-muted)">Menyu müvəqqəti olaraq əlçatan deyil. Sonra baxın!</div>';
    return;
  }
  
  // Строим навигацию по категориям
  nav.innerHTML = allCategories.map(c => {
    const name = getCategoryName(c.category_translations, currentLang) || c.name || 'Kateqoriya';
    return `<button class="cat-btn" data-category-id="${c.id}" onclick="scrollToSection('${c.id}', this)">${escapeHtml(name)}</button>`;
  }).join('');
  
  // Строим секции с блюдами
  let sectionsHtml = '';
  for (const category of allCategories) {
    const items = allMenuItems.filter(item => item.category_id === category.id);
    if (items.length === 0) continue;
    
    const catName = getCategoryName(category.category_translations, currentLang) || category.name || 'Kateqoriya';
    
    sectionsHtml += `
      <div class="menu-section" id="section-${category.id}">
        <div class="menu-section-header">
          <span class="section-emoji">${category.emoji || '🍽️'}</span>
          <h2 class="section-h2">${escapeHtml(catName)}</h2>
        </div>
        <div class="menu-grid">
          ${items.map(item => {
            const name = getDishName(item.dish_translations, currentLang) || item.name || '';
            const desc = getDishDescription(item.dish_translations, currentLang) || item.description || '';
            return `
              <div class="dish-card${!item.available ? ' unavailable' : ''}">
                <div class="dish-img">
                  ${item.image_url ? `<img src="${item.image_url}" alt="${name}" loading="lazy" onerror="this.style.display='none'; this.parentNode.innerHTML='${item.emoji || '🍽️'}'">` : (item.emoji || '🍽️')}
                  ${item.badge ? `<span class="dish-badge">${escapeHtml(item.badge)}</span>` : ''}
                  ${!item.available ? '<span class="dish-unavail-badge" data-i18n="unavailable">Mövcud deyil</span>' : ''}
                </div>
                <div class="dish-body">
                  <h3 class="dish-name">${escapeHtml(name)}</h3>
                  <p class="dish-desc">${escapeHtml(desc)}</p>
                  <div class="dish-footer">
                    <span class="dish-price">${item.price} ₼</span>
                    <span class="dish-tag">${escapeHtml(catName)}</span>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }
  
  if (sectionsHtml === '') {
    body.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-muted)">Menyuda hələ heç bir yemək yoxdur. Sonra baxın!</div>';
    return;
  }
  
  body.innerHTML = sectionsHtml;
  
  // Обновляем бейджи "Недоступно" с переводом
  document.querySelectorAll('[data-i18n="unavailable"]').forEach(el => {
    el.textContent = i18next.t('unavailable');
  });
  
  const firstBtn = document.querySelector('.cat-btn');
  if (firstBtn) firstBtn.classList.add('active');
  setTimeout(() => setupScrollSpy(), 200);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ========== SCROLL SPY ==========
let activeObserver = null;
let isScrollingManually = false;
let scrollTimeout = null;

function setupScrollSpy() {
  if (activeObserver) activeObserver.disconnect();
  
  const sections = allCategories
    .map(c => document.getElementById('section-' + c.id))
    .filter(el => el !== null);
    
  if (sections.length === 0) return;
  
  activeObserver = new IntersectionObserver((entries) => {
    if (isScrollingManually) return;
    
    let bestSection = null;
    let bestRatio = 0;
    
    entries.forEach(entry => {
      if (entry.isIntersecting && entry.intersectionRatio > bestRatio) {
        bestRatio = entry.intersectionRatio;
        bestSection = entry.target;
      }
    });
    
    if (bestSection) {
      const sectionId = bestSection.id.replace('section-', '');
      highlightActiveCategory(sectionId);
    }
  }, { threshold: [0.1, 0.3, 0.5, 0.7], rootMargin: '-80px 0px -100px 0px' });
  
  sections.forEach(section => {
    if (section) activeObserver.observe(section);
  });
  
  window.addEventListener('scroll', () => {
    if (scrollTimeout) clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      if (!isScrollingManually) {
        updateActiveCategoryByScroll();
      }
    }, 100);
  });
}

function updateActiveCategoryByScroll() {
  const sections = allCategories
    .map(c => document.getElementById('section-' + c.id))
    .filter(el => el !== null);
    
  const scrollPosition = window.scrollY + 120;
  let currentSection = null;
  let minDistance = Infinity;
  
  sections.forEach(section => {
    const distance = Math.abs(scrollPosition - section.offsetTop);
    if (distance < minDistance) {
      minDistance = distance;
      currentSection = section;
    }
  });
  
  if (currentSection) {
    const sectionId = currentSection.id.replace('section-', '');
    highlightActiveCategory(sectionId);
  }
}

function highlightActiveCategory(categoryId) {
  const buttons = document.querySelectorAll('.cat-btn');
  let activeButton = null;
  
  buttons.forEach(btn => {
    if (btn.getAttribute('data-category-id') === categoryId) {
      activeButton = btn;
    }
  });
  
  if (activeButton && !activeButton.classList.contains('active')) {
    buttons.forEach(b => b.classList.remove('active'));
    activeButton.classList.add('active');
    
    const nav = document.querySelector('.menu-sticky-nav');
    if (nav) {
      const btnRect = activeButton.getBoundingClientRect();
      const navRect = nav.getBoundingClientRect();
      if (btnRect.left < navRect.left || btnRect.right > navRect.right) {
        activeButton.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }
  }
}

function scrollToSection(categoryId, btn) {
  isScrollingManually = true;
  
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  const el = document.getElementById('section-' + categoryId);
  if (el) {
    const offset = 80;
    const elementPosition = el.getBoundingClientRect().top;
    const offsetPosition = elementPosition + window.scrollY - offset;
    window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
  }
  
  setTimeout(() => {
    isScrollingManually = false;
  }, 800);
}

// ========== ПОПАП ==========
async function loadPromoPopup() {
  try {
    const popupEl = document.getElementById('promoPopup');
    if (!popupEl) return;
    popupEl.classList.remove('show');
    popupEl.style.display = 'none';
    popupShown = false;
    if (popupTimeout) clearTimeout(popupTimeout);
    
    const { data } = await supabaseClient
      .from('promo_popups')
      .select('*')
      .eq('is_active', true)
      .order('created_at', { ascending: false });
    
    if (!data || data.length === 0) return;
    const popup = data[0];
    document.getElementById('promoTitle').textContent = popup.title || 'Aksiya!';
    document.getElementById('promoDesc').textContent = popup.description || '';
    
    const iconContainer = document.getElementById('promoIcon');
    if (iconContainer) {
      iconContainer.innerHTML = '';
      if (popup.image_url && popup.image_url.trim() !== '') {
        const img = document.createElement('img');
        img.src = popup.image_url;
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';
        iconContainer.appendChild(img);
      } else {
        iconContainer.innerHTML = '🎉';
        iconContainer.style.fontSize = '2rem';
        iconContainer.style.display = 'flex';
        iconContainer.style.alignItems = 'center';
        iconContainer.style.justifyContent = 'center';
      }
    }
    
    const btn = document.getElementById('promoBtn');
    if (btn) {
      if (popup.btn_text && popup.btn_text.trim() !== '' && popup.btn_url && popup.btn_url.trim() !== '') {
        btn.textContent = popup.btn_text;
        btn.href = popup.btn_url;
        btn.style.display = 'inline-block';
      } else {
        btn.style.display = 'none';
      }
    }
    
    const delayMs = (popup.delay_seconds || 5) * 1000;
    popupTimeout = setTimeout(() => {
      if (!popupShown) {
        popupEl.style.display = 'flex';
        setTimeout(() => popupEl.classList.add('show'), 50);
        popupShown = true;
      }
    }, delayMs);
  } catch(e) {
    console.error('Ошибка загрузки попапов:', e);
  }
}

function closePromo() {
  const popup = document.getElementById('promoPopup');
  if (popup) {
    popup.classList.remove('show');
    popup.style.display = 'none';
    popupShown = false;
    if (popupTimeout) clearTimeout(popupTimeout);
  }
}

// ========== МОБИЛЬНОЕ МЕНЮ ==========
document.getElementById('burger')?.addEventListener('click', () => {
  document.getElementById('mobileNav').classList.toggle('open');
});

function closeMobileNav() {
  document.getElementById('mobileNav').classList.remove('open');
}

// ========== ЗАПУСК ==========
async function init() {
  await initI18n();
  initLangSwitcher();
  await loadAllSettings();
  updateUILanguage();
  
  // Обновляем элементы с data-i18n еще раз после загрузки
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const translation = i18next.t(key);
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
      if (el.placeholder !== undefined) el.placeholder = translation;
    } else {
      el.innerHTML = translation;
    }
  });
  
  // Устанавливаем флаг и текст для языка
  const flags = { az: '🇦🇿', ru: '🇷🇺', en: '🇬🇧' };
  const texts = { az: 'AZ', ru: 'RU', en: 'EN' };
  const cf = document.getElementById('currentLangFlag');
  const ct = document.getElementById('currentLangText');
  if (cf) cf.textContent = flags[currentLang];
  if (ct) ct.textContent = texts[currentLang];
}

init();
